<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Blog</title>

<style>
:root{
  --bg:#6a0dad;
  --card:#ffffff;
  --text:#111;
  --link:#ffd400;
}

body.dark{
  --bg:#1b0033;
  --card:#2b0a4d;
  --text:#f1f1f1;
  --link:#ffea00;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:rgba(0,0,0,0.2);
}

.logo{
  font-size:18px;
  font-weight:bold;
}

button{
  background:var(--link);
  border:none;
  padding:6px 10px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

.post{
  background:var(--card);
  margin-bottom:10px;
  padding:10px;
  border-radius:6px;
}

.post h2{
  margin:0 0 5px 0;
  font-size:18px;
}

.post a{
  color:var(--link);
  text-decoration:none;
  font-weight:bold;
}

@media(max-width:600px){
  .menu-btn{
    display:block;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Mi Blog Anime</div>
  <button onclick="toggleMode()">Modo</button>
</header>

<div class="container">

  <div class="post">
    <h2>Nuevo Anime Disponible</h2>
    <p>Lista actualizada con nuevos episodios disponibles para descargar.</p>
    <a href="#">Ver más</a>
  </div>

  <div class="post">
    <h2>Manga Recomendado</h2>
    <p>Un manga increíble que debes leer este mes.</p>
    <a href="#">Leer más</a>
  </div>

  <div class="post">
    <h2>Últimas Actualizaciones</h2>
    <p>Se agregaron nuevos enlaces Mega, Drive y Mediafire.</p>
    <a href="#">Ir a descargas</a>
  </div>

</div>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
